<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
    <head>
        <title>Hello Widget</title>
        <meta name="description" content="Minimal Hello Widget" />
        <script type="text/javascript">
            var MyWidget = {
                onLoad: function () {
                    widget.body.innerHTML = '<p style="padding:20px;font-family:Arial,sans-serif;font-size:20px;color:#333;">Loading user...</p>';
                    require(['DS/WAFData/WAFData'], function (WAFData) {
                        WAFData.authenticatedRequest('/api/users/current', {
                            method: 'GET',
                            type: 'json',
                            onComplete: function (data) {
                                var name = data.first_name || data.firstName || data.login || 'User';
                                widget.body.innerHTML = '<p style="padding:20px;font-family:Arial,sans-serif;font-size:20px;color:#333;">Hello ' + name + '!</p>';
                            },
                            onFailure: function () {
                                widget.body.innerHTML = '<p style="padding:20px;font-family:Arial,sans-serif;font-size:20px;color:#e74c3c;">Hello! (user API unavailable)</p>';
                            }
                        });
                    });
                }
            };
            widget.addEvent('onLoad', MyWidget.onLoad);
        </script>
    </head>
    <body>
    </body>
</html>
