<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
    <head>
        <title>Released Items</title>
        <meta name="description" content="Show released items in workspace" />
        <script type="text/javascript">
        //<![CDATA[
            var MyWidget = {
                version: 'v10',
                log: function (msg) {
                    var el = document.getElementById('dbg');
                    if (el) el.innerHTML = el.innerHTML + msg + '<br/>';
                },
                onLoad: function () {
                    widget.body.innerHTML =
                        '<div style="padding:16px;font-family:Arial,sans-serif;">' +
                            '<h2 style="margin:0 0 12px;font-size:18px;color:#333;">Released Items</h2>' +
                            '<div id="results" style="font-size:14px;color:#333;"></div>' +
                            '<div id="dbg" style="color:#999;font-size:11px;margin-top:16px;font-family:monospace;"></div>' +
                        '</div>';

                    MyWidget.log('Widget ' + MyWidget.version);

                    require(['DS/WAFData/WAFData'],
                        function (WAFData) {
                            MyWidget.log('WAFData loaded');

                            var spaceUrl = widget.getValue('x3dPlatformId');
                            MyWidget.log('x3dPlatformId: ' + spaceUrl);

                            /* Try to discover 3DSpace URL from the platform services endpoint */
                            WAFData.authenticatedRequest('/api/v1/platform/service/instance?platformId=' + spaceUrl + '&serviceId=3DSpace', {
                                method: 'GET',
                                type: 'json',
                                onComplete: function (data) {
                                    MyWidget.log('Service discovery: ' + JSON.stringify(data).substring(0, 300));
                                    var url = '';
                                    if (data && data.platformServices) {
                                        for (var i = 0; i < data.platformServices.length; i++) {
                                            if (data.platformServices[i].name === '3DSpace') {
                                                url = data.platformServices[i].url;
                                                break;
                                            }
                                        }
                                    }
                                    if (!url && data && data.url) url = data.url;
                                    if (!url) url = 'https://r1132102984977-eu1-space.3dexperience.3ds.com/enovia';
                                    MyWidget.log('Using 3DSpace: ' + url);
                                    MyWidget.fetchReleased(WAFData, url);
                                },
                                onFailure: function () {
                                    MyWidget.log('Service discovery failed, using fallback URL');
                                    MyWidget.fetchReleased(WAFData, 'https://r1132102984977-eu1-space.3dexperience.3ds.com/enovia');
                                }
                            });
                        },
                        function (err) {
                            MyWidget.log('require FAILED: ' + err.requireType + ' / ' + err.requireModules);
                        }
                    );
                },

                fetchReleased: function (WAFData, spaceUrl) {
                    var csrfUrl = spaceUrl + '/resources/v1/application/CSRF';
                    MyWidget.log('Getting CSRF...');

                    WAFData.authenticatedRequest(csrfUrl, {
                        method: 'GET',
                        type: 'json',
                        onComplete: function (csrfData) {
                            var csrf = csrfData && csrfData.csrf ? csrfData.csrf.value : '';
                            MyWidget.log('CSRF OK');
                            MyWidget.getSecurityContexts(WAFData, spaceUrl, csrf);
                        },
                        onFailure: function () {
                            MyWidget.log('CSRF failed');
                            MyWidget.getSecurityContexts(WAFData, spaceUrl, '');
                        }
                    });
                },

                getSecurityContexts: function (WAFData, spaceUrl, csrf) {
                    var url = spaceUrl + '/resources/modeler/pno/person?current=true&select=preferredcredentials&select=collabspaces';
                    MyWidget.log('Getting security contexts...');

                    var headers = { 'Accept': 'application/json' };
                    if (csrf) headers['ENO_CSRF_TOKEN'] = csrf;

                    WAFData.authenticatedRequest(url, {
                        method: 'GET',
                        type: 'json',
                        headers: headers,
                        onComplete: function (data) {
                            MyWidget.log('Person: ' + JSON.stringify(data).substring(0, 500));
                            var secCtx = '';
                            try {
                                var pref = data.preferredcredentials;
                                if (pref && pref.role) {
                                    secCtx = pref.role.name + '.' + pref.organization.name + '.' + pref.collabspace.name;
                                } else if (data.collabspaces && data.collabspaces.length > 0) {
                                    var cs = data.collabspaces[0];
                                    var couple = cs.couples[0];
                                    secCtx = couple.role.name + '.' + couple.organization.name + '.' + cs.name;
                                }
                            } catch(e) { MyWidget.log('Parse error: ' + e.message); }
                            if (!secCtx) secCtx = 'VPLMProjectLeader.Company Name.Common Space';
                            MyWidget.log('SecurityContext: ' + secCtx);
                            MyWidget.tryAPIs(WAFData, spaceUrl, csrf, secCtx);
                        },
                        onFailure: function (err) {
                            MyWidget.log('Person API error: ' + JSON.stringify(err));
                            MyWidget.tryAPIs(WAFData, spaceUrl, csrf, 'VPLMProjectLeader.Company Name.Common Space');
                        }
                    });
                },

                tryAPIs: function (WAFData, spaceUrl, csrf, secCtx) {
                    var headers = {
                        'SecurityContext': secCtx,
                        'Accept': 'application/json'
                    };
                    if (csrf) headers['ENO_CSRF_TOKEN'] = csrf;

                    /* Try multiple endpoints sequentially */
                    var endpoints = [
                        '/resources/v1/modeler/dseng/dseng:EngItem/search?$searchStr=*&$top=10',
                        '/search/resources/v1/search?query=*&nresults=10',
                        '/resources/v1/application/search?query=*&nresults=10',
                        '/resources/v1/modeler/dslc/search?$searchStr=*&$top=10'
                    ];
                    MyWidget.log('Trying ' + endpoints.length + ' endpoints...');
                    MyWidget.tryNextEndpoint(WAFData, spaceUrl, csrf, headers, endpoints, 0);
                },

                tryNextEndpoint: function (WAFData, spaceUrl, csrf, headers, endpoints, idx) {
                    if (idx >= endpoints.length) {
                        MyWidget.log('All endpoints failed');
                        document.getElementById('results').innerHTML = '<p style="color:#e74c3c;">Could not reach search API.</p>';
                        return;
                    }
                    var url = spaceUrl + endpoints[idx];
                    MyWidget.log('Try #' + (idx + 1) + ': ' + endpoints[idx]);

                    WAFData.authenticatedRequest(url, {
                        method: 'GET',
                        type: 'json',
                        headers: headers,
                        onComplete: function (data) {
                            MyWidget.log('SUCCESS on #' + (idx + 1) + ': ' + Object.keys(data).join(', '));
                            MyWidget.log('Data (500): ' + JSON.stringify(data).substring(0, 500));
                            MyWidget.displayResults(data);
                        },
                        onFailure: function (err) {
                            MyWidget.log('Failed #' + (idx + 1) + ': ' + JSON.stringify(err).substring(0, 100));
                            MyWidget.tryNextEndpoint(WAFData, spaceUrl, csrf, headers, endpoints, idx + 1);
                        }
                    });
                },

                displayResults: function (data) {
                    var el = document.getElementById('results');
                    if (!el) return;

                    var items = data.member || data.results || data.data || [];
                    if (!items.length && data.member === undefined) {
                        items = Array.isArray(data) ? data : [];
                    }

                    if (items.length === 0) {
                        el.innerHTML = '<p style="color:#888;">No released items found.</p>';
                        MyWidget.log('Items array empty. Full keys: ' + JSON.stringify(Object.keys(data)));
                        return;
                    }

                    var html = '<table style="width:100%;border-collapse:collapse;">' +
                        '<tr style="background:#f5f5f5;text-align:left;">' +
                        '<th style="padding:8px;border-bottom:2px solid #ddd;">Name</th>' +
                        '<th style="padding:8px;border-bottom:2px solid #ddd;">Type</th>' +
                        '<th style="padding:8px;border-bottom:2px solid #ddd;">State</th>' +
                        '</tr>';

                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        var name = item.name || item.title || item.dataelements && item.dataelements.title || '—';
                        var type = item.type || item.resourceType || '—';
                        var state = item.current || item.state || item.dataelements && item.dataelements.current || '—';
                        html += '<tr style="border-bottom:1px solid #eee;">' +
                            '<td style="padding:6px 8px;">' + name + '</td>' +
                            '<td style="padding:6px 8px;">' + type + '</td>' +
                            '<td style="padding:6px 8px;">' + state + '</td>' +
                            '</tr>';
                    }
                    html += '</table>';
                    el.innerHTML = html;
                    MyWidget.log('Displayed ' + items.length + ' items');
                }
            };
            widget.addEvent('onLoad', MyWidget.onLoad);
        //]]>
        </script>
    </head>
    <body>
    </body>
</html>
