<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
    <head>
        <title>Released Items</title>
        <meta name="description" content="Show released items in workspace" />
        <script type="text/javascript">
        //<![CDATA[
            var MyWidget = {
                version: 'v16',
                log: function (msg) {
                    var el = document.getElementById('dbg');
                    if (el) el.innerHTML = el.innerHTML + msg + '<br/>';
                },
                onLoad: function () {
                    widget.body.innerHTML =
                        '<div style="padding:16px;font-family:Arial,sans-serif;">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center;margin:0 0 12px;">' +
                                '<h2 style="margin:0;font-size:18px;color:#333;">Released Items</h2>' +
                                '<span style="font-size:11px;color:#aaa;font-family:monospace;">' + MyWidget.version + '</span>' +
                            '</div>' +
                            '<div id="results" style="font-size:14px;color:#333;"></div>' +
                            '<div id="dbg" style="color:#999;font-size:11px;margin-top:16px;font-family:monospace;"></div>' +
                        '</div>';

                    MyWidget.log('Widget ' + MyWidget.version);

                    require(['DS/WAFData/WAFData'],
                        function (WAFData) {
                            MyWidget.log('WAFData loaded');

                            var spaceUrl = widget.getValue('x3dPlatformId');
                            MyWidget.log('x3dPlatformId: ' + spaceUrl);

                            /* Try to discover 3DSpace URL from the platform services endpoint */
                            WAFData.authenticatedRequest('/api/v1/platform/service/instance?platformId=' + spaceUrl + '&serviceId=3DSpace', {
                                method: 'GET',
                                type: 'json',
                                onComplete: function (data) {
                                    MyWidget.log('Service discovery: ' + JSON.stringify(data).substring(0, 300));
                                    var url = '';
                                    if (data && data.platformServices) {
                                        for (var i = 0; i < data.platformServices.length; i++) {
                                            if (data.platformServices[i].name === '3DSpace') {
                                                url = data.platformServices[i].url;
                                                break;
                                            }
                                        }
                                    }
                                    if (!url && data && data.url) url = data.url;
                                    if (!url) url = 'https://r1132102984977-eu1-space.3dexperience.3ds.com/enovia';
                                    MyWidget.log('Using 3DSpace: ' + url);
                                    MyWidget.fetchReleased(WAFData, url);
                                },
                                onFailure: function () {
                                    MyWidget.log('Service discovery failed, using fallback URL');
                                    MyWidget.fetchReleased(WAFData, 'https://r1132102984977-eu1-space.3dexperience.3ds.com/enovia');
                                }
                            });
                        },
                        function (err) {
                            MyWidget.log('require FAILED: ' + err.requireType + ' / ' + err.requireModules);
                        }
                    );
                },

                fetchReleased: function (WAFData, spaceUrl) {
                    var csrfUrl = spaceUrl + '/resources/v1/application/CSRF';
                    MyWidget.log('Getting CSRF...');

                    WAFData.authenticatedRequest(csrfUrl, {
                        method: 'GET',
                        type: 'json',
                        onComplete: function (csrfData) {
                            var csrf = csrfData && csrfData.csrf ? csrfData.csrf.value : '';
                            MyWidget.log('CSRF OK');
                            MyWidget.getSecurityContexts(WAFData, spaceUrl, csrf);
                        },
                        onFailure: function () {
                            MyWidget.log('CSRF failed');
                            MyWidget.getSecurityContexts(WAFData, spaceUrl, '');
                        }
                    });
                },

                getSecurityContexts: function (WAFData, spaceUrl, csrf) {
                    var url = spaceUrl + '/resources/modeler/pno/person?current=true&select=preferredcredentials&select=collabspaces';
                    MyWidget.log('Getting collabspaces...');

                    var headers = { 'Accept': 'application/json' };
                    if (csrf) headers['ENO_CSRF_TOKEN'] = csrf;

                    WAFData.authenticatedRequest(url, {
                        method: 'GET',
                        type: 'json',
                        headers: headers,
                        onComplete: function (data) {
                            /* Build list of all security contexts (one per collabspace) */
                            var contexts = [];
                            try {
                                var spaces = data.collabspaces || [];
                                for (var i = 0; i < spaces.length; i++) {
                                    var cs = spaces[i];
                                    if (cs.couples && cs.couples.length > 0) {
                                        var c = cs.couples[0];
                                        contexts.push(c.role.name + '.' + c.organization.name + '.' + cs.name);
                                    }
                                }
                            } catch(e) { MyWidget.log('Parse error: ' + e.message); }
                            if (contexts.length === 0) contexts.push('VPLMProjectLeader.Company Name.Common Space');
                            MyWidget.log(contexts.length + ' collabspaces: ' + contexts.join(' | '));
                            MyWidget.searchAllSpaces(WAFData, spaceUrl, csrf, contexts);
                        },
                        onFailure: function (err) {
                            MyWidget.log('Person API error');
                            MyWidget.searchAllSpaces(WAFData, spaceUrl, csrf, ['VPLMProjectLeader.Company Name.Common Space']);
                        }
                    });
                },

                searchAllSpaces: function (WAFData, spaceUrl, csrf, contexts) {
                    MyWidget.WAFData = WAFData;
                    MyWidget.spaceUrl = spaceUrl;
                    MyWidget.allItems = [];
                    MyWidget.seenIds = {};

                    /* For each collabspace, search EngItem + Drawing */
                    var typeEndpoints = [
                        '/resources/v1/modeler/dseng/dseng:EngItem/search?$searchStr=*&$top=100',
                        '/resources/v1/modeler/dseng/dseng:Drawing/search?$searchStr=*&$top=100'
                    ];

                    MyWidget.pendingSearches = contexts.length * typeEndpoints.length;
                    MyWidget.log('Searching: ' + contexts.length + ' spaces x ' + typeEndpoints.length + ' types = ' + MyWidget.pendingSearches + ' queries');

                    for (var c = 0; c < contexts.length; c++) {
                        var headers = {
                            'SecurityContext': contexts[c],
                            'Accept': 'application/json'
                        };
                        if (csrf) headers['ENO_CSRF_TOKEN'] = csrf;
                        for (var t = 0; t < typeEndpoints.length; t++) {
                            MyWidget.searchType(typeEndpoints[t], headers, contexts[c]);
                        }
                    }
                },

                searchType: function (endpoint, headers, ctxName) {
                    var space = ctxName.split('.')[2] || '';
                    var typeName = endpoint.split('?')[0].split('/').pop();
                    MyWidget.fetchPage(endpoint, headers, space, typeName, 0, 0);
                },

                fetchPage: function (endpoint, headers, space, typeName, skip, pageReleased) {
                    var pageSize = 100;
                    var baseUrl = endpoint.replace(/\$top=\d+/, '$top=' + pageSize);
                    if (skip > 0) baseUrl += '&$skip=' + skip;
                    var url = MyWidget.spaceUrl + baseUrl;

                    MyWidget.WAFData.authenticatedRequest(url, {
                        method: 'GET',
                        type: 'json',
                        headers: headers,
                        onComplete: function (data) {
                            var items = data.member || [];
                            var added = 0;
                            for (var i = 0; i < items.length; i++) {
                                if (items[i].state === 'RELEASED' && !MyWidget.seenIds[items[i].id]) {
                                    MyWidget.seenIds[items[i].id] = true;
                                    items[i].collabspace = space;
                                    MyWidget.allItems.push(items[i]);
                                    added++;
                                }
                            }
                            pageReleased += added;
                            var total = data.totalItems || 0;
                            var fetched = skip + items.length;

                            if (items.length === pageSize) {
                                /* Full page returned — always try next page */
                                MyWidget.fetchPage(endpoint, headers, space, typeName, fetched, pageReleased);
                            } else {
                                MyWidget.log(space + ' ' + typeName + ': ' + fetched + '/' + total + ' scanned, ' + pageReleased + ' released');
                                MyWidget.pendingSearches--;
                                if (MyWidget.pendingSearches <= 0) {
                                    MyWidget.log('Total released: ' + MyWidget.allItems.length);
                                    MyWidget.displayResults(MyWidget.allItems);
                                }
                            }
                        },
                        onFailure: function () {
                            MyWidget.log(space + ' ' + typeName + ': failed');
                            MyWidget.pendingSearches--;
                            if (MyWidget.pendingSearches <= 0) {
                                MyWidget.log('Total released: ' + MyWidget.allItems.length);
                                MyWidget.displayResults(MyWidget.allItems);
                            }
                        }
                    });
                },

                displayResults: function (items) {
                    var el = document.getElementById('results');
                    if (!el) return;

                    if (items.length === 0) {
                        el.innerHTML = '<p style="color:#888;">No released items found.</p>';
                        return;
                    }

                    /* Sort by name */
                    items.sort(function (a, b) {
                        return (a.name || '').localeCompare(b.name || '');
                    });

                    MyWidget.log(items.length + ' released items');

                    var html = '<table style="width:100%;border-collapse:collapse;">' +
                        '<tr style="background:#f0f4f8;text-align:left;">' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Name</th>' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Title</th>' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Type</th>' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Rev</th>' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Owner</th>' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Space</th>' +
                        '<th style="padding:10px 12px;border-bottom:2px solid #ccc;font-weight:600;">Modified</th>' +
                        '</tr>';

                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        var bg = i % 2 === 0 ? '#fff' : '#f9fafb';
                        html += '<tr style="background:' + bg + ';border-bottom:1px solid #eee;">' +
                            '<td style="padding:8px 12px;">' + (item.name || '—') + '</td>' +
                            '<td style="padding:8px 12px;">' + (item.title || '—') + '</td>' +
                            '<td style="padding:8px 12px;">' + (item.type || '—') + '</td>' +
                            '<td style="padding:8px 12px;">' + (item.revision || '—') + '</td>' +
                            '<td style="padding:8px 12px;">' + (item.owner || '—') + '</td>' +
                            '<td style="padding:8px 12px;">' + (item.collabspace || '—') + '</td>' +
                            '<td style="padding:8px 12px;">' + (item.modified || '—') + '</td>' +
                            '</tr>';
                    }
                    html += '</table>';
                    el.innerHTML = html;
                }
            };
            widget.addEvent('onLoad', MyWidget.onLoad);
        //]]>
        </script>
    </head>
    <body>
    </body>
</html>
