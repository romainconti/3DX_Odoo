<html>
<head>
<title>Hello Widget</title>
<meta name="apiVersion" content="1.0" />
<meta name="description" content="Minimal Hello Widget" />
</head>
<body>
<p id="static" style="font-size:24px;color:red;padding:20px;">Hello (static)</p>
<script>
/* Try every known UWA method to inject content */
var msg = '<p style="font-size:24px;padding:20px;">Hello World</p>';
var done = false;

function trySet() {
    if (done) return;

    /* 1 — widget.setBody (documented UWA method) */
    try { widget.setBody(msg); done = true; return; } catch(e){}

    /* 2 — widget.body.setContent (UWA Element method) */
    try { widget.body.setContent(msg); done = true; return; } catch(e){}

    /* 3 — widget.body.setHTML */
    try { widget.body.setHTML(msg); done = true; return; } catch(e){}

    /* 4 — widget.body.innerHTML (raw DOM) */
    try { widget.body.innerHTML = msg; done = true; return; } catch(e){}

    /* 5 — widget.body.addContent */
    try { widget.body.addContent(msg); done = true; return; } catch(e){}

    /* 6 — direct document.body */
    try { document.body.innerHTML = msg; done = true; return; } catch(e){}
}

if (typeof widget !== 'undefined' && widget.addEvent) {
    widget.addEvent('onLoad', trySet);
} else {
    trySet();
}
</script>
</body>
</html>
